<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BTC Macro Dashboard</title>

<link rel="stylesheet" href="style.css">

<script type="text/javascript"
src="https://s3.tradingview.com/tv.js">
</script>

</head>

<body>

<div class="main-title">
    BTC 宏觀方向（4-24小時） + 短線預測（1-3小時）
</div>

<div class="top-status">

    <div class="major-alert" id="alertBox">
        Loading...
    </div>

    <div class="short-predict" id="predictionText">
        Loading...
    </div>

</div>

<div class="btc-price" id="btcPrice">
    Loading...
</div>

<div class="btc-volume" id="btcVolume">
    Loading...
</div>

<div class="macro-direction" id="macroText">
    Loading...
</div>

<div class="macro-reason" id="macroReason">
    全球宏觀數據分析中...
</div>

<div class="charts-wrapper">

    <div class="chart-box">

        <div class="chart-title">
            BTC 即時 5m 走勢
        </div>

        <div id="btc_chart"></div>

    </div>

    <div class="chart-box">

        <div class="chart-title">
            美元指數 DXY 1個月強弱
        </div>

        <div id="dxy_chart"></div>

    </div>

</div>

<div class="global-data">

    <div class="global-item dxy" id="dxy">
        Loading...
    </div>

    <div class="global-item dow" id="dow">
        Loading...
    </div>

    <div class="global-item us10y" id="us10y">
        Loading...
    </div>

    <div class="global-item vix" id="vix">
        Loading...
    </div>

    <div class="global-item gold" id="gold">
        Loading...
    </div>

    <div class="global-item fear" id="fear">
        Loading...
    </div>

</div>

<div class="update-time" id="updateTime">
    Loading...
</div>

<script src="script.js"></script>

</body>
</html>
