<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0"
/>

<title>
Crypto Monitor
</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<div class="main-title">

DUAL COIN 1-3H AI PREDICTOR

</div>

<div
id="updateTime"
class="update-time"
>
HK UPDATE TIME
</div>

<div class="main-container">

<div class="coin-panel">

<div class="coin-title">

LEFT COIN

</div>

<div class="input-row">

<input
id="leftInput"
value="TON"
/>

<button
onclick="loadCoin('left')"
>
LOAD
</button>

</div>

<div
id="leftPrice"
class="price"
>
Loading...
</div>

<div
id="leftPrediction"
class="prediction"
>
Loading...
</div>

<div
id="leftBoxes"
class="predict-boxes"
>
</div>

<div
id="leftInfo"
class="info"
>
Loading...
</div>

</div>

<div class="coin-panel">

<div class="coin-title">

RIGHT COIN

</div>

<div class="input-row">

<input
id="rightInput"
value="BTC"
/>

<button
onclick="loadCoin('right')"
>
LOAD
</button>

</div>

<div
id="rightPrice"
class="price"
>
Loading...
</div>

<div
id="rightPrediction"
class="prediction"
>
Loading...
</div>

<div
id="rightBoxes"
class="predict-boxes"
>
</div>

<div
id="rightInfo"
class="info"
>
Loading...
</div>

</div>

</div>

<div
id="macroArea"
class="macro-panel"
>
Loading...
</div>

<script src="newapp.js"></script>

</body>
</html>
