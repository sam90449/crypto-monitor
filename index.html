<!DOCTYPE html>
<html lang="zh-HK">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<title>Crypto Monitor</title>

<meta name="theme-color" content="#000000">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta
name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<meta
name="apple-mobile-web-app-title"
content="Crypto Monitor">

<link rel="manifest" href="manifest.json">

<link rel="apple-touch-icon" href="icon-192.png">

<link rel="icon" type="image/png" href="icon-192.png">

<link rel="stylesheet" href="style.css">

<script
type="text/javascript"
src="https://s3.tradingview.com/tv.js">
</script>

</head>

<body>

<div class="main-title">
    即時幣種 5m 走勢 + 美元指數 DXY
</div>

<div class="symbol-panel">

    <input
        type="text"
        id="symbolInput"
        placeholder="輸入幣種，例如：sol / btc / xrp"
        autocomplete="off"
        spellcheck="false"
    >

    <button id="loadBtn">
        顯示圖表
    </button>

</div>

<div class="charts-wrapper">

    <div class="chart-box">

        <div
            class="chart-title"
            id="leftTitle">

            BTC 即時5m 走勢

        </div>

        <div id="btc_chart"></div>

    </div>

    <div class="chart-box">

        <div class="chart-title">
            美元指數DXY 1個月強弱
        </div>

        <div id="dxy_chart"></div>

    </div>

</div>

<div class="global-data">

    <div
        class="global-item dxy"
        id="dxy">

        Loading...

    </div>

    <div
        class="global-item dow"
        id="dow">

        Loading...

    </div>

    <div
        class="global-item us10y"
        id="us10y">

        Loading...

    </div>

    <div
        class="global-item vix"
        id="vix">

        Loading...

    </div>

    <div
        class="global-item gold"
        id="gold">

        Loading...

    </div>

    <div
        class="global-item fear"
        id="fear">

        Loading...

    </div>

</div>

<div
    class="update-time"
    id="updateTime">

    Loading...

</div>

<script src="script.js"></script>

</body>
</html>
