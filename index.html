<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Crypto Monitor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-title">
DUAL COIN 1-3H AI PREDICTOR
</div>

<div class="update-time" id="updateTime">
Loading HK Time...
</div>

<div class="container">

<div class="panel">

<div class="coin-title">
LEFT COIN
</div>

<div class="input-row">

<input
id="leftInput"
class="coin-input"
value="TON"
>

<button
class="load-btn"
onclick="loadCoin('left')"
>
LOAD
</button>

</div>

<div
class="price"
id="leftPrice"
>
TONUSDT : Loading...
</div>

<div class="red-box-row">

<div class="red-box"></div>
<div class="red-box"></div>
<div class="red-box"></div>
<div class="red-box"></div>

</div>

<div
class="prediction"
id="leftPrediction"
>
1-3H Prediction : Loading...
</div>

<div
class="info-box"
id="leftInfo"
>
Loading...
</div>

</div>

<div class="panel">

<div class="coin-title">
RIGHT COIN
</div>

<div class="input-row">

<input
id="rightInput"
class="coin-input"
value="BTC"
>

<button
class="load-btn"
onclick="loadCoin('right')"
>
LOAD
</button>

</div>

<div
class="price"
id="rightPrice"
>
BTCUSDT : Loading...
</div>

<div class="red-box-row">

<div class="red-box"></div>
<div class="red-box"></div>
<div class="red-box"></div>
<div class="red-box"></div>

</div>

<div
class="prediction"
id="rightPrediction"
>
1-3H Prediction : Loading...
</div>

<div
class="info-box"
id="rightInfo"
>
Loading...
</div>

</div>

</div>

<script src="script.js"></script>

<script>

function updateHKTime(){

    const now =
    new Date();

    const hk =
    now.toLocaleString(
    "en-US",
    {
        timeZone:"Asia/Hong_Kong"
    }
    );

    document.getElementById(
    "updateTime"
    ).innerHTML =
    "HK UPDATE TIME : " + hk;

}

updateHKTime();

setInterval(updateHKTime,1000);

loadCoin("left");
loadCoin("right");

</script>

</body>

</html>
